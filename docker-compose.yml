services:
  pswitch:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    container_name: pswitch
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PSWITCH_ADMIN_TOKEN: ${PSWITCH_ADMIN_TOKEN:-}
    volumes:
      - ./data:/data
